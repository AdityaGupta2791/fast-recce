# ─────────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT ONLY
# Credentials below are intentional defaults for local Docker networking.
# Services are bound to localhost only — NEVER expose these ports publicly.
# For production, use managed services (RDS, ElastiCache, S3) with real secrets
# injected via the hosting platform's secret manager.
# ─────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: fastrecce-postgres
    environment:
      POSTGRES_USER: fastrecce
      POSTGRES_PASSWORD: fastrecce_dev
      POSTGRES_DB: fastrecce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fastrecce -d fastrecce"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fastrecce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: fastrecce-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
